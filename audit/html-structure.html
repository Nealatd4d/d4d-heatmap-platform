
<div id="app">
  <div class="header">
    <div class="header-left">
      <svg class="header-logo" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="D4D Logo">
        <rect x="1" y="1" width="26" height="26" rx="5" stroke="#4fc3f7" stroke-width="1.5"></rect>
        
        <circle cx="20" cy="10" r="2" fill="#fdd835"></circle>
      </svg>
      <div>
        <div class="header-title desktop-title">D4D Election Heatmap Platform</div>
        <div class="header-title mobile-title">D4D Heatmap</div>
        <div class="header-subtitle desktop-subtitle">Precinct-Level Election Data · Cook County &amp; Chicago</div>
      </div>
    </div>
    <div class="header-right">
      <div class="header-stats" id="headerStats"></div>
      <button class="filter-toggle" id="filterToggle" aria-label="Toggle filters" onclick="toggleToolbar()">
        <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" width="18" height="18">
          
        </svg>
      </button>
    </div>
  </div>

  <div class="toolbar" id="toolbar">
    <div class="toolbar-controls" id="toolbarControls">
      <!-- Data Layer Toggle -->
      <span class="toolbar-label">Data Layer</span>
      <div class="layer-toggle">
        <button class="layer-btn active" data-layer="election" onclick="setDataLayer('election')">Election Results</button>
        <button class="layer-btn" data-layer="finance" onclick="setDataLayer('finance')">Campaign Finance</button>
      </div>

      <!-- Election Results controls -->
      <div id="electionControls">
        <span class="toolbar-label">Election</span>
        <select id="selElection"><option value="2026_primary">2026 Gubernatorial Primary</option><option value="2025_consolidated">2025 Consolidated Election</option><option value="2024_general">2024 General Election</option><option value="2024_primary">2024 Primary Election</option><option value="2023_municipal_runoff">2023 Chicago Municipal Runoff</option><option value="2023_municipal">2023 Chicago Municipal Election</option><option value="2022_general">2022 General Election</option><option value="2022_primary">2022 Primary Election</option></select>
        <div class="toolbar-sep"></div>
        <span class="toolbar-label">District</span>
        <select id="selType"><option value="">Select Type…</option><optgroup label="Legislative"><option value="state_rep">State House</option><option value="state_senate">State Senate</option><option value="congress">Congressional</option></optgroup><optgroup label="Suburban Municipal"><option value="municipal">Municipal Office</option></optgroup><optgroup label="Township"><option value="township_committeeperson">Committeeperson</option></optgroup><optgroup label="Cook County"><option value="cook_commissioner">Commissioner</option><option value="cook_president">Board President</option><option value="cook_assessor">Assessor</option><option value="cook_clerk">County Clerk</option><option value="cook_treasurer">County Treasurer</option><option value="cook_sheriff">Sheriff</option><option value="board_of_review">Board of Review</option><option value="mwrd">MWRD</option></optgroup><optgroup label="Judicial"><option value="circuit_court">Circuit Court</option><option value="subcircuit">Subcircuit</option><option value="appellate_court">Appellate Court</option></optgroup><optgroup label="Education"><option value="school_district">School District</option></optgroup><optgroup label="District"><option value="fire_district">Fire District</option></optgroup><optgroup label="State-wide"><option value="governor">Governor</option><option value="us_senate">U.S. Senate</option><option value="attorney_general">Attorney General</option><option value="secretary_of_state">Sec. of State</option><option value="comptroller">Comptroller</option><option value="treasurer_state">State Treasurer</option><option value="state_central_comm">State Central Comm.</option></optgroup><optgroup label="Referendums"><option value="referendum">Referendum</option></optgroup></select>
        <select id="selRace" disabled=""><option value="">Select Race…</option></select>
        <div class="toolbar-sep"></div>
        <span class="toolbar-label">View</span>
        <div class="mode-group" id="electionModes">
          <button class="mode-btn active" data-mode="turnout">Turnout</button>
          <button class="mode-btn" data-mode="winner">Winner</button>
          <button class="mode-btn" data-mode="margin">Margin</button>
          <button class="mode-btn" data-mode="candidate">Candidate</button>
          <button class="mode-btn" data-mode="vs">Vs</button>
          <button class="mode-btn" data-mode="turnout_delta">Turnout Δ</button>
          <button class="mode-btn" data-mode="swing">Swing</button>
          <button class="mode-btn" data-mode="votes">Votes</button>
        </div>
        <div class="view-opts" id="viewOpts"></div>
        <div class="toolbar-sep"></div>
        <span class="toolbar-label">Focus</span>
        <select id="selFocus"><option value="">All Precincts</option></select>
      </div>

      <!-- Campaign Finance controls (hidden by default) -->
      <div id="financeControls" class="finance-controls hidden">
        <span class="toolbar-label">Finance Cycle</span>
        <select id="selFinanceElection"><option value="">Loading…</option></select>
        <div class="toolbar-sep"></div>
        <span class="toolbar-label">Committee</span>
        <select id="selCommitteeA"><option value="">Select Committee…</option></select>
        <select id="selCommitteeB" class="hidden"><option value="">Vs Committee…</option></select>
        <select id="selFinancePrev" class="hidden"><option value="">Previous Cycle…</option></select>
        <div class="toolbar-sep"></div>
        <span class="toolbar-label">View</span>
        <div class="mode-group" id="financeModes">
          <button class="mode-btn active" data-fmode="supporters">Supporters</button>
          <button class="mode-btn" data-fmode="whales">Whales</button>
          <button class="mode-btn" data-fmode="donor_margin">Donor Margin</button>
          <button class="mode-btn" data-fmode="candidate">Candidate $</button>
          <button class="mode-btn" data-fmode="vs">Vs</button>
          <button class="mode-btn" data-fmode="money_delta">Money Δ</button>
          <button class="mode-btn" data-fmode="swing">Swing</button>
          <button class="mode-btn" data-fmode="votes">Total $</button>
        </div>
      </div>
      <div class="toolbar-sep"></div>
      <button class="export-btn" onclick="exportPNG()" title="Export current view as PNG">
        <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          
        </svg>
        Export PNG
      </button>
    </div>
  </div>
